name: e2e

# Browser-driven end-to-end tests against LIVE PROD (app/auth.rewindjs.com).
# Every run sends real magic-link emails and mints real prod sessions, so this
# is a post-merge synthetic monitor — NOT a per-PR gate. It runs on pushes to
# main that touch the tested apps or the suite itself, plus on-demand.
#
# The specs `test.skip` when RESEND_API_KEY is absent, so forked-PR runs (which
# GitHub denies secret access) degrade to a clean skip rather than a failure.

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - "auth/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch: {}

# Don't pile up prod-hitting runs; a newer push supersedes an in-flight one.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e suite
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
